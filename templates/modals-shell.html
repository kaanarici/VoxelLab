<div id="annot-modal">
  <div class="ask-card">
    <div class="ask-header">
      <div class="ask-title" id="annot-title">New annotation</div>
      <div class="ask-badge" id="annot-meta"></div>
      <button class="ask-close" id="annot-close" aria-label="Cancel (Esc)">×</button>
    </div>
    <div class="ask-body-wrap">
      <textarea id="annot-text" class="annot-textarea" rows="4" placeholder="What do you want to remember about this spot?"></textarea>
      <div class="annot-actions">
        <button class="annot-btn danger" id="annot-delete">Delete</button>
        <div class="annot-spacer"></div>
        <button class="annot-btn" id="annot-cancel">Cancel</button>
        <button class="annot-btn primary" id="annot-save">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="confirm-modal">
  <div class="ask-card">
    <div class="ask-header">
      <div class="ask-title" id="confirm-title">Confirm</div>
      <button class="ask-close" id="confirm-close" aria-label="Close (Esc)">×</button>
    </div>
    <div class="ask-body-wrap" id="confirm-body"></div>
  </div>
</div>

<div id="shortcuts-modal">
  <div class="shortcuts-card" role="dialog" aria-modal="true" aria-labelledby="shortcuts-title">
    <div class="ask-header has-subtitle">
      <div class="ask-heading">
        <div class="ask-title" id="shortcuts-title">Keyboard shortcuts</div>
        <div class="shortcuts-subtitle">Customize command shortcuts. Duplicate bindings are blocked.</div>
      </div>
      <button class="ask-close" id="shortcuts-close" aria-label="Close (Esc)">×</button>
    </div>
    <div class="shortcuts-body">
      <div class="shortcuts-head" aria-hidden="true">
        <span>Command</span>
        <span>Keybinding</span>
      </div>
      <div class="shortcuts-list" id="shortcuts-list"></div>
    </div>
  </div>
</div>

<div id="consult-modal">
  <div class="ask-card">
    <div class="ask-header">
      <div class="ask-title">Consolidated read</div>
      <div class="ask-badge">AI · Not a diagnosis</div>
      <button class="ask-close" id="consult-close" aria-label="Close (Esc)">×</button>
    </div>
    <div class="ask-body-wrap" id="consult-body"></div>
  </div>
</div>
