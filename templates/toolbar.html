<div class="controls">
  <div class="scrub-block">
    <button class="icon-btn cine" id="btn-play" data-tip="Play / pause (space)" aria-label="Play / pause">
      <svg class="ico"><use href="icons.svg#i-play"/></svg>
    </button>
    <div class="scrubber">
      <div id="scrub-ticks" aria-hidden="true"></div>
      <input type="range" id="scrub" min="0" max="0" value="0" aria-label="Slice" />
    </div>
    <div class="ctr-count" aria-busy="true" aria-label="Slice position">
      <span class="ctr-part ctr-part--cur"><b id="slice-cur"></b></span><span class="ctr-sep">/</span><span class="ctr-part ctr-part--tot"><span id="slice-tot"></span></span>
    </div>
    <div class="cine-speed" data-tip="Playback speed — slices per second">
      <input type="range" id="fps" min="5" max="30" value="12" aria-label="Playback speed (slices per second)" />
      <span class="cine-fps"><span id="fps-val">12</span><span class="cine-fps-unit">fps</span></span>
    </div>
  </div>

  <div class="toolbar-sep toolbar-sep--after-scrub" aria-hidden="true"></div>

  <div class="tool-rail-wrap" id="tool-rail-wrap">
  <div class="tool-rail" id="tool-rail">
  <div class="tool-group" data-tg="display">
    <button class="icon-btn" id="btn-auto" data-tip="Auto contrast (a)" data-key="a" aria-label="Auto contrast"><svg class="ico"><use href="icons.svg#i-sun"/></svg></button>
    <button class="icon-btn" id="btn-invert" data-tip="Invert (i)" data-key="i" aria-label="Invert"><svg class="ico"><use href="icons.svg#i-flip"/></svg></button>
    <button class="icon-btn" id="btn-zoom-out" data-tip="Zoom out" aria-label="Zoom out"><svg class="ico"><use href="icons.svg#i-minus"/></svg></button>
    <button class="icon-btn" id="btn-zoomfit" data-tip="Fit (f)" data-key="f" aria-label="Zoom to fit"><svg class="ico"><use href="icons.svg#i-maximize"/></svg></button>
    <button class="icon-btn" id="btn-zoom-in" data-tip="Zoom in" aria-label="Zoom in"><svg class="ico"><use href="icons.svg#i-plus"/></svg></button>
    <div class="custom-dropdown" id="cmap-dropdown">
      <button class="dd-trigger" id="cmap-trigger" aria-label="Colormap" aria-haspopup="listbox" aria-expanded="false"><span id="cmap-label">Grayscale</span><svg class="dd-chevron"><use href="icons.svg#i-chevron-down"/></svg></button>
      <div class="dd-menu" id="cmap-menu" role="listbox"></div>
    </div>
  </div>

  <div class="tool-group tool-group--wl" data-tg="wl">
    <div class="wl-control" id="wl-control" hidden>
      <span class="oo-label" data-tip="Window / Level — contrast &amp; brightness. Also Shift + drag on the image.">W/L</span>
      <input type="range" id="wl-window" min="1" max="512" step="1" value="255" aria-label="Window width (contrast)" data-tip="Window width — contrast" />
      <input type="range" id="wl-level" min="0" max="255" step="1" value="128" aria-label="Window level (brightness)" data-tip="Window level — brightness" />
    </div>
    <div class="mr-presets" id="mr-presets" hidden>
      <button class="icon-btn" data-mrpreset="full" data-tip="Full range" aria-label="Full range W/L preset">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>
      </button>
      <button class="icon-btn" data-mrpreset="contrast" data-tip="High contrast" aria-label="High contrast W/L preset">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18Z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="icon-btn" data-mrpreset="bright" data-tip="Bright" aria-label="Bright W/L preset">
        <svg class="ico" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>
      </button>
    </div>
    <div class="ct-presets" id="ct-presets" hidden>
      <button class="ct-preset-btn" type="button" data-ctpreset="lung" data-tip="Lung window · WL −500 / WW 1500 HU">Lung</button>
      <button class="ct-preset-btn" type="button" data-ctpreset="soft" data-tip="Soft-tissue window · WL 50 / WW 400 HU">Soft</button>
      <button class="ct-preset-btn" type="button" data-ctpreset="bone" data-tip="Bone window · WL 300 / WW 2000 HU">Bone</button>
      <button class="ct-preset-btn" type="button" data-ctpreset="full" data-tip="Full HU range">Full</button>
    </div>
    <div class="overlay-opacity-wrap" id="overlay-opacity-wrap" hidden>
      <span class="oo-label">Opacity</span>
      <input type="range" id="overlay-opacity" min="0" max="1" step="0.05" value="0.55" aria-label="Overlay opacity" />
    </div>
  </div>

  <div class="toolbox" id="toolbox-measure">
    <button class="toolbox-trigger toolbox-trigger--labeled" data-tip="Tools" aria-label="Measurement tools">
      <svg class="ico"><use href="icons.svg#i-ruler"/></svg><span class="tb-label">Tools</span><span class="tb-dot"></span>
    </button>
    <div class="toolbox-panel menu-flyout menu-actions" data-tg="measure">
      <div class="menu-group-label">Measure</div>
      <button class="icon-btn labeled menu-row" id="btn-measure" data-key="r" aria-label="Ruler"><svg class="ico"><use href="icons.svg#i-ruler"/></svg><span>Ruler</span></button>
      <button class="icon-btn labeled menu-row" id="btn-angle" data-key="g" aria-label="Angle"><svg class="ico"><use href="icons.svg#i-corner"/></svg><span>Angle</span></button>
      <div class="menu-group-label">Regions</div>
      <button class="icon-btn labeled menu-row" id="btn-roi-ell" data-key="e" aria-label="Ellipse ROI"><svg class="ico"><use href="icons.svg#i-circle"/></svg><span>Ellipse</span></button>
      <button class="icon-btn labeled menu-row" id="btn-roi-poly" data-key="p" aria-label="Polygon ROI"><svg class="ico"><use href="icons.svg#i-polygon"/></svg><span>Polygon</span></button>
      <button class="icon-btn labeled menu-row" id="btn-roi-point" data-key="o" aria-label="Point count ROI"><svg class="ico"><use href="icons.svg#i-pin"/></svg><span>Point</span></button>
      <div class="menu-group-label">Annotate</div>
      <button class="icon-btn labeled menu-row" id="btn-annot" data-key="n" aria-label="Annotate"><svg class="ico"><use href="icons.svg#i-pin"/></svg><span>Annotate</span></button>
      <div class="menu-divider" aria-hidden="true"></div>
      <button class="icon-btn labeled menu-row menu-row--danger" id="btn-clear" aria-label="Clear"><svg class="ico"><use href="icons.svg#i-x"/></svg><span>Clear slice</span></button>
    </div>
  </div>

  <div class="toolbox" id="toolbox-overlays">
    <button class="toolbox-trigger toolbox-trigger--labeled" data-tip="Overlays" aria-label="Overlay layers">
      <svg class="ico"><use href="icons.svg#i-layers"/></svg><span class="tb-label">Overlays</span><span class="tb-dot"></span>
    </button>
    <div class="toolbox-panel menu-flyout menu-toggles" data-tg="overlays">
      <div class="menu-group-label">Overlays</div>
      <button class="icon-btn labeled menu-row" id="btn-brain" aria-label="Brain">
        <svg class="ico"><use href="icons.svg#i-brain"/></svg><span>Skull strip</span>
      </button>
      <button class="icon-btn labeled menu-row" id="btn-seg" aria-label="Tissue">
        <svg class="ico"><use href="icons.svg#i-grid"/></svg><span>Tissue map</span>
      </button>
      <button class="icon-btn labeled menu-row" id="btn-regions" aria-label="Anatomy">
        <svg class="ico"><use href="icons.svg#i-map"/></svg><span>Anatomy</span>
      </button>
      <button class="icon-btn labeled menu-row menu-row--sub" id="btn-anatomy-labels" aria-label="Anatomy labels">
        <svg class="ico"><use href="icons.svg#i-atlas"/></svg><span>Labels</span>
      </button>
      <button class="icon-btn labeled menu-row" id="btn-sym" aria-label="Symmetry">
        <svg class="ico"><use href="icons.svg#i-flip"/></svg><span>Symmetry</span>
      </button>
    </div>
  </div>

  <div class="tool-group" data-tg="views">
    <div class="custom-dropdown" id="cmp-dropdown">
      <button class="icon-btn labeled" id="btn-compare" data-tip="Compare (c)" aria-label="Compare" aria-controls="cmp-menu" aria-expanded="false">
        <svg class="ico"><use href="icons.svg#i-columns"/></svg><span>Compare</span>
      </button>
      <div class="dd-menu" id="cmp-menu" role="group" aria-label="Compare series"></div>
    </div>
    <button class="icon-btn labeled" id="btn-mpr" data-tip="MPR (m)" aria-label="MPR">
      <svg class="ico"><use href="icons.svg#i-grid"/></svg><span>MPR</span>
    </button>
    <button class="icon-btn labeled" id="btn-3d" data-tip="3D (3)" aria-label="3D">
      <svg class="ico"><use href="icons.svg#i-cube"/></svg><span>3D</span>
    </button>
  </div>
  </div>
  </div>


</div>
