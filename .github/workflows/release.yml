# Public release shape: tag `v*` -> verify, build desktop artifacts, and publish a GitHub release.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip
      - run: npm ci
      - run: python -m pip install -e ".[dev]"
      - run: npx playwright install --with-deps chromium
      - run: xvfb-run -a env PYTHON=python npm run check

  build-macos:
    runs-on: macos-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run desktop:make:mac
      - uses: actions/upload-artifact@v4
        with:
          name: voxellab-macos
          if-no-files-found: error
          path: |
            out/forge/make/**/*.dmg
            out/forge/make/**/*.zip

  build-windows:
    runs-on: windows-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run desktop:make:win
      - uses: actions/upload-artifact@v4
        with:
          name: voxellab-windows
          if-no-files-found: error
          path: |
            out/forge/make/**/*.exe
            out/forge/make/**/*.nupkg
            out/forge/make/**/RELEASES

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: find release-assets -maxdepth 5 -type f -print
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/**/*
