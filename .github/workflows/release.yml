# Public release shape: tag `v*` -> verify, build desktop artifacts, and publish a GitHub release.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-canonical:
    uses: ./.github/workflows/check.yml

  verify-lab-readiness:
    runs-on: ubuntu-latest
    needs:
      - verify-canonical
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip
      - run: node scripts/check_release_version.mjs "$GITHUB_REF_NAME"
      - run: npm ci
      - run: python -m pip install -e ".[dev,pipeline,microscopy,ai,cloud]"
      - run: npx playwright install --with-deps chromium
      - run: xvfb-run -a env PYTHON=python node scripts/check_lab_readiness.mjs --skip-validation-matrix --skip-public-export --report lab-readiness-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: voxellab-lab-readiness
          if-no-files-found: error
          path: lab-readiness-report.json

  build-macos:
    runs-on: macos-latest
    needs:
      - verify-lab-readiness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run desktop:make:mac
      - run: node scripts/check_desktop_make_outputs.mjs out/forge/make darwin
      - run: npm run desktop:smoke:packaged:mac
      - run: npm run desktop:smoke:release:mac
      - uses: actions/upload-artifact@v4
        with:
          name: voxellab-macos
          if-no-files-found: error
          path: |
            out/forge/make/**/*.dmg
            out/forge/make/**/*.zip

  build-windows:
    runs-on: windows-latest
    needs:
      - verify-lab-readiness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run desktop:make:win
      - run: node scripts/check_desktop_make_outputs.mjs out/forge/make win32
      - uses: actions/upload-artifact@v4
        with:
          name: voxellab-windows
          if-no-files-found: error
          path: |
            out/forge/make/**/*.exe
            out/forge/make/**/*.nupkg
            out/forge/make/**/RELEASES

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - verify-lab-readiness
      - build-macos
      - build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - run: find release-assets -maxdepth 5 -type f -print
      - run: node scripts/check_release_assets.mjs release-assets
      - run: node scripts/extract_release_notes.mjs CHANGELOG.md release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: release-assets/**/*
